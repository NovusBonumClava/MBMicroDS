name: Build MBMicroDS with BlocksDS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install BlocksDS
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip build-essential
        wget https://github.com/blocksds/sdk/releases/download/v1.15.0/blocksds-linux.tar.xz
        tar -xf blocksds-linux.tar.xz
        sudo mv blocksds /opt/
        echo "BLOCKSDS=/opt/blocksds" >> $GITHUB_ENV
        echo "$PATH:/opt/blocksds/bin" >> $GITHUB_PATH

    - name: Build
      run: |
        export BLOCKSDS=/opt/blocksds
        export PATH=$PATH:/opt/blocksds/bin
        cd MBMicroDS
        make clean
        make

    - name: Upload .nds
      uses: actions/upload-artifact@v4
      with:
        name: MBMicroDS
        path: MBMicroDS/MBMicroDS.nds
