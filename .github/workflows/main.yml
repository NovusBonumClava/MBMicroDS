name: Build MBMicroDS with BlocksDS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install BlocksDS
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip build-essential
        wget https://github.com/blocksds/sdk/releases/latest/download/blocksds-linux.tar.xz
        tar -xf blocksds-linux.tar.xz
        sudo mv blocksds /opt/
        echo "export BLOCKSDS=/opt/blocksds" >> $GITHUB_ENV
        echo "export PATH=$PATH:/opt/blocksds/bin" >> $GITHUB_ENV

    - name: Build
      run: |
        export BLOCKSDS=/opt/blocksds
        export PATH=$PATH:/opt/blocksds/bin
        cd MBMicroDS
        make -f Makefile.blocksds clean
        make -f Makefile.blocksds

    - name: Upload .nds
      uses: actions/upload-artifact@v4
      with:
        name: MBMicroDS
        path: MBMicroDS/MBMicroDS.nds
