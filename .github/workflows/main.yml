name: Build MBMicroDS (Docker)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    container:
      image: devkitpro/devkitarm:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build
      run: |
        make clean
        make

    - name: Upload .nds
      uses: actions/upload-artifact@v4
      with:
        name: MBMicroDS
        path: MBMicroDS.nds
