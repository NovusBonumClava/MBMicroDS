name: Build MBMicroDS (Native)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install ARM toolchain and ndstool
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi
        sudo apt-get install -y libnds-dev
        wget https://github.com/devkitPro/ndstool/releases/download/v2.1.2/ndstool-2.1.2-linux-amd64.zip
        unzip ndstool-2.1.2-linux-amd64.zip
        sudo mv ndstool /usr/local/bin/
        sudo chmod +x /usr/local/bin/ndstool

    - name: Build
      run: |
        cd MBMicroDS
        make clean
        make

    - name: Upload .nds
      uses: actions/upload-artifact@v4
      with:
        name: MBMicroDS
        path: MBMicroDS/MBMicroDS.nds
