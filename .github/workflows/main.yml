name: Build MBMicroDS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install devkitPro
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip
        wget https://github.com/devkitPro/pacman/releases/download/devkitpro-pacman-1.0.3/devkitpro-pacman-1.0.3-1-x86_64.pkg.tar.xz
        sudo tar -xf devkitpro-pacman-1.0.3-1-x86_64.pkg.tar.xz -C /
        sudo dkp-pacman -Syu --noconfirm
        sudo dkp-pacman -S devkitARM nds-dev --noconfirm

    - name: Build
      run: |
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=/opt/devkitpro/devkitARM
        export PATH=$PATH:/opt/devkitpro/tools/bin
        cd MBMicroDS
        make clean
        make

    - name: Upload .nds
      uses: actions/upload-artifact@v4
      with:
        name: MBMicroDS
        path: MBMicroDS/MBMicroDS.nds
